name: CI

permissions:
  contents: read

env:
  # Required by Hugo's css.Sass "dartsass" transpiler; keep in sync with
  # .devcontainer/post-create.sh
  DART_SASS_VERSION: "1.100.0"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install Dart Sass
        run: |
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" | sudo tar -xz -C /usr/local/lib
          echo "/usr/local/lib/dart-sass" >> "$GITHUB_PATH"

      - name: Build
        run: hugo --minify

  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: live
    steps:
      - uses: actions/checkout@v7

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install Dart Sass
        run: |
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" | sudo tar -xz -C /usr/local/lib
          echo "/usr/local/lib/dart-sass" >> "$GITHUB_PATH"

      - name: Build
        run: hugo --minify

      - name: Update file permissions
        run: make setperms
        
      - name: Deploy
        uses: easingthemes/ssh-deploy@v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }} 
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.REMOTE_DIR }}
          SOURCE: "public/"
          ARGS: "--delete"
